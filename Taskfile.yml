# https://taskfile.dev
version: '3'

tasks:
  default:
    cmds:
      - task: all

  all:
    desc: Build everything (mdbxv)
    deps: [mdbxv]

  mdbxv:
    desc: Build the MDBX Viewer image and bring up the stack
    cmds:
      - echo "Building MDBX Viewer..."
      - docker compose up -d --build --force-recreate
